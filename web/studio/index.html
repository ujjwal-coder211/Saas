<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aksh Studio | Aitotech</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    header h1 { margin:0; font-size:16px; }
    header a { color:var(--accent); text-decoration:none; font-size:13px; }
    .pill { font-size:11px; color:var(--ok); border:1px solid var(--ok); padding:2px 8px; border-radius:999px; }
    .layout { flex:1; display:grid; grid-template-columns:200px 220px 1fr 300px; min-height:0; }
    .threads, .sidebar, .chat-panel { border-right:1px solid var(--border); background:var(--panel); overflow:auto; }
    .chat-panel { border-right:none; border-left:1px solid var(--border); display:flex; flex-direction:column; }
    .threads, .sidebar { padding:10px; font-size:13px; }
    .threads h3, .sidebar h3 { margin:0 0 8px; font-size:11px; color:var(--muted); text-transform:uppercase; }
    button, select, input, textarea { font:inherit; }
    button { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:8px 10px; cursor:pointer; font-weight:600; font-size:12px; }
    button.secondary { background:#21262d; color:var(--text); border:1px solid var(--border); }
    .thread-item { padding:6px 8px; border-radius:6px; cursor:pointer; margin-bottom:4px; border:1px solid transparent; }
    .thread-item:hover, .thread-item.active { background:#21262d; border-color:var(--border); }
    .file-tree { list-style:none; padding:0; margin:0; }
    .file-tree li { padding:4px 6px; border-radius:4px; cursor:pointer; }
    .file-tree li:hover, .file-tree li.active { background:#21262d; }
    #editor { min-height:0; }
    .editor-wrap { display:flex; flex-direction:column; min-height:0; }
    .tabs { display:flex; gap:4px; margin-bottom:8px; }
    .tabs button { flex:1; }
    .tab-active { outline:2px solid var(--accent); }
    .chat-log { flex:1; overflow:auto; padding:10px; font-size:13px; }
    .chat-msg { margin-bottom:8px; padding:8px; border-radius:8px; background:#0d1117; border:1px solid var(--border); white-space:pre-wrap; }
    .chat-input { padding:10px; border-top:1px solid var(--border); }
    .chat-input textarea { width:100%; min-height:64px; background:#0d1117; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; resize:vertical; margin-bottom:8px; }
    label { font-size:11px; color:var(--muted); display:block; margin-bottom:4px; }
    .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .row input, .row select { flex:1; min-width:80px; padding:6px; border-radius:6px; border:1px solid var(--border); background:#0d1117; color:var(--text); font-size:12px; }
    @media (max-width:1100px) { .layout { grid-template-columns: 1fr 1fr; } .threads { display:none; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
</head>
<body>
  <header>
    <h1>Aksh Studio</h1>
    <span class="pill">Powered by Omni</span>
    <a href="/web/index.html">Home</a>
    <a href="/web/docs/">Docs</a>
    <a href="/web/dashboard/">Dashboard</a>
    <a href="/web/chat.html">Chat</a>
    <span id="saveStatus" style="color:var(--muted);font-size:12px;margin-left:auto"></span>
  </header>

  <div class="layout">
    <aside class="threads">
      <h3>Chat threads</h3>
      <button class="secondary" style="width:100%;margin-bottom:8px" onclick="newThread()">+ New thread</button>
      <div id="threadList"></div>
    </aside>

    <aside class="sidebar">
      <h3>Cloud project</h3>
      <div class="row">
        <select id="cloudProject" onchange="loadCloudProject(this.value)" style="width:100%"></select>
      </div>
      <div class="row">
        <button onclick="createCloudProject()">New cloud</button>
        <label style="cursor:pointer"><button class="secondary" onclick="document.getElementById('zipInput').click()">Upload zip</button></label>
        <input id="zipInput" type="file" accept=".zip" style="display:none" onchange="uploadZip(this.files[0])" />
      </div>
      <h3 style="margin-top:12px">Files</h3>
      <ul id="fileTree" class="file-tree"></ul>
      <div class="row" style="margin-top:8px">
        <input id="newFileName" placeholder="src/app.py" />
        <button class="secondary" onclick="addCloudFile()">Add</button>
      </div>
      <h3 style="margin-top:12px">API Key</h3>
      <input id="apiKey" type="password" placeholder="SaaS API key" style="width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);background:#0d1117;color:var(--text);margin-bottom:6px" />
      <button class="secondary" style="width:100%" onclick="saveSettings()">Save key</button>
    </aside>

    <main class="editor-wrap">
      <div id="editor" style="flex:1"></div>
    </main>

    <aside class="chat-panel">
      <div style="padding:10px;border-bottom:1px solid var(--border)">
        <div class="tabs">
          <button id="tabChat" class="tab-active" onclick="setTab('chat')">Chat</button>
          <button id="tabAgent" onclick="setTab('agent')">Agent</button>
        </div>
        <div class="row">
          <select id="searchMode">
            <option value="auto">Search: Auto</option>
            <option value="on">On</option>
            <option value="off">Off</option>
          </select>
          <label><input type="checkbox" id="attachFile" checked /> @file</label>
        </div>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <div class="chat-input">
        <textarea id="prompt" placeholder="Omni se poocho — coding, app, Hinglish..."></textarea>
        <button id="sendBtn" onclick="send()">Ask Omni</button>
      </div>
    </aside>
  </div>

  <script>
    const LS_KEY = 'nr_key';
    const LS_THREAD = 'aksh_active_thread';
    const LS_SEARCH = 'aksh_search_mode';
    let editor = null, activeTab = 'chat';
    let cloudProjectId = null, activeFile = 'README.md', fileCache = {};
    let threadId = localStorage.getItem(LS_THREAD) || null;
    let saveTimer = null;

    function authHeaders() {
      const key = document.getElementById('apiKey').value || localStorage.getItem(LS_KEY) || '';
      return { Authorization: 'Bearer ' + key, 'Content-Type': 'application/json' };
    }
    function api(path, opts = {}) {
      return fetch(window.location.origin + path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
    }

    function saveSettings() {
      localStorage.setItem(LS_KEY, document.getElementById('apiKey').value);
      localStorage.setItem(LS_SEARCH, document.getElementById('searchMode').value);
      refreshCloudProjects();
      refreshThreads();
    }

    async function refreshCloudProjects() {
      const sel = document.getElementById('cloudProject');
      try {
        const res = await api('/saas/v1/projects');
        if (!res.ok) throw new Error('Cloud projects need SaaS signup + DATABASE_URL');
        const data = await res.json();
        sel.innerHTML = '<option value="">— select —</option>';
        (data.projects || []).forEach(p => {
          const o = document.createElement('option');
          o.value = p.id; o.textContent = p.name;
          if (p.id === cloudProjectId) o.selected = true;
          sel.appendChild(o);
        });
      } catch (e) {
        sel.innerHTML = '<option value="">Local only — add API key</option>';
      }
    }

    async function createCloudProject() {
      const name = prompt('Project name:', 'my-app');
      if (!name) return;
      const res = await api('/saas/v1/projects', { method: 'POST', body: JSON.stringify({ name }) });
      const data = await res.json();
      if (!res.ok) return alert(data.detail || JSON.stringify(data));
      cloudProjectId = data.id;
      await refreshCloudProjects();
      await loadCloudProject(data.id);
    }

    async function uploadZip(file) {
      if (!file) return;
      const fd = new FormData();
      fd.append('file', file);
      const key = document.getElementById('apiKey').value || localStorage.getItem(LS_KEY);
      const res = await fetch(window.location.origin + '/saas/v1/projects/upload', {
        method: 'POST', headers: { Authorization: 'Bearer ' + key }, body: fd
      });
      const data = await res.json();
      if (!res.ok) return alert(data.detail || JSON.stringify(data));
      cloudProjectId = data.id;
      await refreshCloudProjects();
      await loadCloudProject(data.id);
    }

    async function loadCloudProject(id) {
      if (!id) return;
      cloudProjectId = id;
      const res = await api('/saas/v1/projects/' + id + '/files');
      const data = await res.json();
      if (!res.ok) return alert(data.detail || 'Load failed');
      fileCache = {};
      for (const path of data.files || []) {
        const fr = await api('/saas/v1/projects/' + id + '/files/' + path.split('/').map(encodeURIComponent).join('/'));
        if (fr.ok) { const fd = await fr.json(); fileCache[path] = fd.content; }
      }
      if (!activeFile || !fileCache[activeFile]) activeFile = (data.files || [])[0] || 'README.md';
      renderTree();
      loadEditorContent();
    }

    function renderTree() {
      const ul = document.getElementById('fileTree');
      ul.innerHTML = '';
      Object.keys(fileCache).sort().forEach(path => {
        const li = document.createElement('li');
        li.textContent = path;
        if (path === activeFile) li.classList.add('active');
        li.onclick = () => { saveFileDebounced(); activeFile = path; renderTree(); loadEditorContent(); };
        ul.appendChild(li);
      });
    }

    async function addCloudFile() {
      const path = document.getElementById('newFileName').value.trim();
      if (!path || !cloudProjectId) return alert('Select cloud project first');
      fileCache[path] = '';
      activeFile = path;
      renderTree();
      loadEditorContent();
      await saveFileNow();
    }

    function loadEditorContent() {
      if (editor) editor.setValue(fileCache[activeFile] ?? '');
    }

    function saveFileDebounced() {
      if (editor && activeFile) fileCache[activeFile] = editor.getValue();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveFileNow, 1500);
      document.getElementById('saveStatus').textContent = 'Saving...';
    }

    async function saveFileNow() {
      if (!cloudProjectId || !activeFile) { document.getElementById('saveStatus').textContent = ''; return; }
      const content = fileCache[activeFile] ?? '';
      const res = await api('/saas/v1/projects/' + cloudProjectId + '/files/' + activeFile.split('/').map(encodeURIComponent).join('/'), {
        method: 'PUT', body: JSON.stringify({ content })
      });
      document.getElementById('saveStatus').textContent = res.ok ? 'Saved ✓' : 'Save failed';
    }

    async function refreshThreads() {
      const box = document.getElementById('threadList');
      box.innerHTML = '';
      try {
        const res = await api('/saas/v1/threads');
        if (!res.ok) throw new Error('');
        const data = await res.json();
        (data.threads || []).forEach(t => {
          const d = document.createElement('div');
          d.className = 'thread-item' + (t.id === threadId ? ' active' : '');
          d.textContent = (t.title || 'Chat').slice(0, 40);
          d.onclick = () => selectThread(t.id);
          box.appendChild(d);
        });
      } catch {
        box.innerHTML = '<p style="color:var(--muted);font-size:11px">SaaS key + DB for memory</p>';
      }
    }

    async function newThread() {
      const res = await api('/saas/v1/threads', { method: 'POST', body: JSON.stringify({ title: 'New chat' }) });
      const data = await res.json();
      if (!res.ok) return alert(data.detail || 'Need SaaS account');
      threadId = data.id;
      localStorage.setItem(LS_THREAD, threadId);
      document.getElementById('chatLog').innerHTML = '';
      await refreshThreads();
    }

    async function selectThread(id) {
      threadId = id;
      localStorage.setItem(LS_THREAD, id);
      await refreshThreads();
      const res = await api('/saas/v1/threads/' + id + '/messages');
      const data = await res.json();
      const log = document.getElementById('chatLog');
      log.innerHTML = '';
      (data.messages || []).forEach(m => addMsg(m.role === 'user' ? 'user' : 'bot', m.content, false));
    }

    function setTab(tab) {
      activeTab = tab;
      document.getElementById('tabChat').classList.toggle('tab-active', tab === 'chat');
      document.getElementById('tabAgent').classList.toggle('tab-active', tab === 'agent');
    }

    function addMsg(role, text, scroll = true) {
      const d = document.createElement('div');
      d.className = 'chat-msg';
      d.textContent = (role === 'user' ? 'You: ' : 'Omni: ') + text;
      document.getElementById('chatLog').appendChild(d);
      if (scroll) document.getElementById('chatLog').scrollTop = 99999;
    }

    async function send() {
      const q = document.getElementById('prompt').value.trim();
      if (!q) return;
      saveFileDebounced();
      if (!threadId && activeTab === 'chat') await newThread();
      addMsg('user', q);
      document.getElementById('prompt').value = '';
      document.getElementById('sendBtn').disabled = true;
      const search = document.getElementById('searchMode').value;
      let file_context = '';
      if (document.getElementById('attachFile').checked && activeFile) {
        file_context = 'File: ' + activeFile + '\n```\n' + (fileCache[activeFile] || '') + '\n```';
      }
      const rules = fileCache['.akshrules'] || '';
      try {
        const path = activeTab === 'agent' ? '/v1/agent/run' : '/v1/chat';
        const body = activeTab === 'agent'
          ? { task: q, file_context, rules }
          : { message: q, search, file_context, rules, thread_id: threadId, project_id: cloudProjectId };
        const res = await api(path, { method: 'POST', body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail));
        addMsg('bot', data.answer || JSON.stringify(data, null, 2));
        if (data.thread_id) threadId = data.thread_id;
        await refreshThreads();
      } catch (e) {
        addMsg('bot', 'Error: ' + e.message);
      }
      document.getElementById('sendBtn').disabled = false;
    }

    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: '# Aksh Studio\n', language: 'markdown', theme: 'vs-dark', automaticLayout: true,
      });
      editor.onDidChangeModelContent(() => saveFileDebounced());
      const savedKey = localStorage.getItem(LS_KEY);
      if (savedKey) document.getElementById('apiKey').value = savedKey;
      const savedSearch = localStorage.getItem(LS_SEARCH);
      if (savedSearch) document.getElementById('searchMode').value = savedSearch;
      refreshCloudProjects();
      refreshThreads();
      if (threadId) selectThread(threadId);
    });
  </script>
</body>
</html>
