services:
  - type: web
    name: aitotech-neuralrouter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn neuralrouter.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: DEEPINFRA_API_KEY
        sync: false
      - key: NEURALROUTER_API_KEYS
        sync: false
