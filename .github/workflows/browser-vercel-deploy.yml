# Build apps/browser and deploy static SPA to Vercel (app.routely.aitotech.in).
# Create a separate Vercel project rooted at apps/browser, then set secrets below.

name: Deploy Browser to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/browser/**'
      - '.github/workflows/browser-vercel-deploy.yml'
  workflow_dispatch:

concurrency:
  group: routely-browser-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_ROUTELY_API_URL: ${{ vars.VITE_ROUTELY_API_URL || 'https://api.routely.aitotech.in' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/browser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/browser/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_BROWSER_PROJECT_ID }}
          working-directory: apps/browser
          vercel-args: '--prod'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BROWSER_PROJECT_ID }}
